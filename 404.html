<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f0f;
  color:#fff;
  text-align:center;
}

.container{
  max-width:600px;
  padding:20px;
}

h1{
  font-size:7rem;
  margin-bottom:20px;
}

p{
  font-size:1.2rem;
  color:#bdbdbd;
  margin-bottom:30px;
}

a{
  display:inline-block;
  padding:14px 30px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:40px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<h1>404</h1>

<p>
Sorry, the page you are looking for is currently unavailable.
</p>

<a href="index.html">
Back To Home
</a>

</div>

</body>
</html>
