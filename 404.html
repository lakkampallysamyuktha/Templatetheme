<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Stackly Foundation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,700;0,900;1,300;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg: #04080f;
    --green: #a3e635;
    --green-3: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
    --muted-2: #94a3b8;
    --card: #0c1525;
    --border: rgba(163,230,53,0.1);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 20px;
  }

  /* Background glow */
  .bg-glow {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(163,230,53,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  /* Main card */
  .error-card {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 560px;
    width: 100%;
    padding: 56px 48px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 32px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(163,230,53,0.05);
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }
  /* Top  line */
  .error-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(163,230,53,0.4), transparent);
    border-radius: 50%;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Logo */
  .error-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    text-decoration: none;
  }
  .error-logo-text {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  /* 404 number */
  .error-number {
    font-family: var(--font-display);
    font-size: clamp(4rem, 12vw, 7rem);
    font-weight: 900;
    color: var(--green);
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: -2px;
    -webkit-text-stroke: 2px var(--green);
    text-shadow: 0 0 40px rgba(163,230,53,0.25);
  }

  .error-title {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: #fff;
    margin-bottom: 14px;
  }

  .error-desc {
    color: var(--muted-2);
    font-size: 0.96rem;
    line-height: 1.78;
    margin-bottom: 36px;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }
  /* Buttons */
  .error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0;
  }
  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 13px 28px;
    background: linear-gradient(135deg, var(--green), var(--green-3));
    color: #04080f;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: 0.35s cubic-bezier(0.25,1,0.5,1);
    position: relative;
    overflow: hidden;
  }
  .btn-home::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--green-3), var(--green));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-home:hover::before { opacity: 1; }
  .btn-home:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(163,230,53,0.35);
  }
  .btn-home i,
  .btn-home span { position: relative; z-index: 1; }
  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 13px 28px;
    color: #fff;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.9rem;
    border-radius: 50px;
    border: 1.5px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    text-decoration: none;
    transition: 0.35s;
    cursor: pointer;
  }
  .btn-back:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(163,230,53,0.06);
    transform: translateY(-3px);
  }
  /* Responsive */
  @media (max-width: 480px) {
    .error-card { padding: 40px 22px; }
    .error-number { font-size: 5rem; }
    .error-actions { flex-direction: column; align-items: stretch; }
    .btn-home, .btn-back { justify-content: center; }
    .ql-row { gap: 6px; }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="error-card">
  <!-- Logo -->
  <a href="index.html" class="error-logo">
    <span class="error-logo-text">Stackly</span>
  </a>
  <div class="error-number">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-desc">
    Oops! The page you're looking for doesn't exist or may have been moved.
    Let's get you back on track.
  </p>
  <!-- Action buttons -->
  <div class="error-actions">
    <a href="index.html" class="btn-home">
      <span>Back to Home</span>
    </a>
    <button onclick="history.back()" class="btn-back">
      <i class="fas fa-arrow-left"></i>
      <span>Go Back</span>
    </button>
  </div>
</div>
</body>
</html>
